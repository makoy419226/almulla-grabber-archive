name: Deploy to GoDaddy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build and upload static site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build GoDaddy static site
        run: npm run build:godaddy

      - name: Validate GoDaddy FTP secrets
        run: |
          test -n "${{ secrets.GODADDY_FTP_SERVER }}" || (echo "Missing GODADDY_FTP_SERVER" && exit 1)
          test -n "${{ secrets.GODADDY_FTP_USERNAME }}" || (echo "Missing GODADDY_FTP_USERNAME" && exit 1)
          test -n "${{ secrets.GODADDY_FTP_PASSWORD }}" || (echo "Missing GODADDY_FTP_PASSWORD" && exit 1)

      - name: Upload to GoDaddy hosting
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.GODADDY_FTP_SERVER }}
          username: ${{ secrets.GODADDY_FTP_USERNAME }}
          password: ${{ secrets.GODADDY_FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./godaddy-dist/
          server-dir: /
